<!doctype html>
<html lang="en">
  <head>
    <title>Online Poll Creator</title>
  </head>
  <body>
    <h1>Online Poll Creator</h1>
    <h2>Create Poll</h2>
    <label for="question">Enter Question</label>
    <input type="text" id="question" placeholder="Enter your question" />
    <label for="options">Enter Options</label>
    <input type="text" placeholder="Option1, Option2" />

    <button>Create Poll</button>

    <div id="poll"></div>
  </body>
</html>
